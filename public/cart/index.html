<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart - ShopSphere</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <script>
    tailwind.config = {
      content: [],
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    .product-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    * { transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease; }
  </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 font-sans min-h-screen">

  <!-- Header (Same as main page) -->
  <header class="sticky top-0 z-50 bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-5">
      <div class="flex items-center justify-between gap-4">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-violet-600 to-indigo-600 rounded-2xl flex items-center justify-center text-white font-bold text-3xl">S</div>
          <h1 class="text-2xl sm:text-3xl font-bold tracking-tighter">ShopSphere</h1>
        </div>

        <div class="flex items-center gap-6">
          <a href="index.html" class="text-zinc-500 hover:text-zinc-900 dark:hover:text-white font-medium">Home</a>
          <a href="#" class="text-violet-600 font-medium">Cart</a>
          
          <button id="themeToggle" class="text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white p-2 rounded-xl">
            <i id="themeIcon" class="fa-solid fa-moon text-2xl"></i>
          </button>
          
          <div class="w-9 h-9 rounded-2xl overflow-hidden border-2 border-white dark:border-zinc-700">
            <img src="https://i.pravatar.cc/128" alt="User" class="w-full h-full object-cover"/>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-10">
    <h1 class="text-4xl font-bold mb-8">Your Cart</h1>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- Cart Items -->
      <div class="lg:col-span-8" id="cartItemsContainer">
        <!-- Populated by JavaScript -->
      </div>

      <!-- Order Summary -->
      <div class="lg:col-span-4">
        <div class="bg-white dark:bg-zinc-900 rounded-3xl p-8 sticky top-24 border border-zinc-200 dark:border-zinc-700">
          <h3 class="text-2xl font-semibold mb-6">Order Summary</h3>
          
          <div class="space-y-4 mb-8">
            <div class="flex justify-between">
              <span class="text-zinc-600 dark:text-zinc-400">Subtotal</span>
              <span id="subtotal" class="font-medium">$0.00</span>
            </div>
            <div class="flex justify-between">
              <span class="text-zinc-600 dark:text-zinc-400">Shipping</span>
              <span class="text-emerald-600 font-medium">FREE</span>
            </div>
            <div class="flex justify-between border-t border-zinc-200 dark:border-zinc-700 pt-4">
              <span class="font-semibold">Total</span>
              <span id="total" class="text-2xl font-bold">$0.00</span>
            </div>
          </div>

          <button onclick="proceedToCheckout()" 
                  class="w-full bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-700 hover:to-indigo-700 text-white py-5 rounded-2xl font-semibold text-lg mb-4">
            Proceed to Checkout
          </button>
          
          <a href="/" 
             class="block text-center text-zinc-500 hover:text-zinc-900 dark:hover:text-white font-medium">
            ← Continue Shopping
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Empty Cart State -->
  <div id="emptyCart" class="hidden max-w-7xl mx-auto px-4 py-20 text-center">
    <i class="fa-solid fa-bag-shopping text-8xl text-zinc-300 dark:text-zinc-700 mb-8"></i>
    <h2 class="text-3xl font-semibold mb-3">Your cart is empty</h2>
    <p class="text-zinc-500 dark:text-zinc-400 mb-10 max-w-md mx-auto">
      Looks like you haven't added any products yet. Start shopping to fill your cart!
    </p>
    <a href="index.html" 
       class="inline-block bg-zinc-900 hover:bg-black dark:bg-white dark:hover:bg-zinc-100 dark:text-zinc-900 text-white px-10 py-4 rounded-2xl font-semibold">
      Browse Products
    </a>
  </div>

  <script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function saveCart() {
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    function renderCart() {
      const container = document.getElementById('cartItemsContainer');
      const emptyCart = document.getElementById('emptyCart');

      if (cart.length === 0) {
        container.classList.add('hidden');
        emptyCart.classList.remove('hidden');
        updateSummary();
        return;
      }

      container.classList.remove('hidden');
      emptyCart.classList.add('hidden');

      let html = '';
      let subtotal = 0;

      cart.forEach((item, index) => {
        const quantity = item.quantity || 1;
        const itemTotal = parseFloat(item.price) * quantity;
        subtotal += itemTotal;

        html += `
          <div class="bg-white dark:bg-zinc-900 rounded-3xl p-6 mb-6 border border-zinc-200 dark:border-zinc-700">
            <div class="flex gap-6">
              <!-- Image -->
              <div class="w-32 h-32 bg-zinc-100 dark:bg-zinc-800 rounded-2xl overflow-hidden flex-shrink-0">
                <img src="${item.image}" 
                     onerror="this.src='https://picsum.photos/id/${item.id + 10}/600/400'"
                     alt="${item.name}" 
                     class="w-full h-full object-cover"/>
              </div>

              <!-- Details -->
              <div class="flex-1">
                <div class="flex justify-between">
                  <div>
                    <p class="text-sm text-violet-600 dark:text-violet-400">${item.category?.name || 'Product'}</p>
                    <h3 class="font-semibold text-xl mt-1">${item.name}</h3>
                    <p class="text-zinc-500 dark:text-zinc-400">${item.brand || ''}</p>
                  </div>
                  <button onclick="removeFromCart(${index})" 
                          class="text-rose-500 hover:text-rose-600 p-2">
                    <i class="fa-solid fa-trash"></i>
                  </button>
                </div>

                <div class="flex items-center justify-between mt-8">
                  <div class="flex items-center border border-zinc-300 dark:border-zinc-600 rounded-2xl overflow-hidden">
                    <button onclick="changeQuantity(${index}, -1)" 
                            class="px-4 py-2 hover:bg-zinc-100 dark:hover:bg-zinc-800 text-xl font-medium">-</button>
                    <span class="px-6 font-semibold">${quantity}</span>
                    <button onclick="changeQuantity(${index}, 1)" 
                            class="px-4 py-2 hover:bg-zinc-100 dark:hover:bg-zinc-800 text-xl font-medium">+</button>
                  </div>

                  <div class="text-right">
                    <div class="text-2xl font-bold">$${itemTotal.toFixed(2)}</div>
                    <div class="text-sm text-zinc-500">$${parseFloat(item.price).toFixed(2)} each</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
      updateSummary();
    }

    function changeQuantity(index, change) {
      cart[index].quantity = (cart[index].quantity || 1) + change;
      if (cart[index].quantity < 1) cart[index].quantity = 1;
      saveCart();
      renderCart();
    }

    function removeFromCart(index) {
      if (confirm("Remove this item from your cart?")) {
        cart.splice(index, 1);
        saveCart();
        renderCart();
      }
    }

    function updateSummary() {
      let subtotal = 0;
      cart.forEach(item => {
        subtotal += parseFloat(item.price) * (item.quantity || 1);
      });

      document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
      document.getElementById('total').textContent = `$${subtotal.toFixed(2)}`;
    }

    function proceedToCheckout() {
      if (cart.length === 0) return;
      alert("🎉 Proceeding to checkout!\n\n(This is a demo. In real app, this would go to payment page.)");
      // You can redirect here: window.location.href = 'checkout.html';
    }

    // Theme Toggle
    function initTheme() {
      if (localStorage.getItem('theme') === 'dark' || 
         (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
        document.getElementById('themeIcon').classList.replace('fa-moon', 'fa-sun');
      }
    }

    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      const icon = document.getElementById('themeIcon');
      icon.classList.toggle('fa-sun', isDark);
      icon.classList.toggle('fa-moon', !isDark);
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    // Initialize
    window.onload = () => {
      initTheme();
      document.getElementById('themeToggle').addEventListener('click', toggleTheme);
      renderCart();
    };
  </script>
</body>
</html>
