<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopSphere - Premium Products</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <script>
    tailwind.config = {
      content: [],
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    .product-card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .product-card:hover {
      transform: translateY(-12px);
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15);
    }
    .modal {
      animation: modalPop 0.3s ease-out forwards;
    }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.95) translateY(30px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .image-container {
      background: linear-gradient(145deg, #f3f4f6, #e5e7eb);
    }
    .dark .image-container {
      background: linear-gradient(145deg, #27272a, #18181b);
    }
    * {
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }
  </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 font-sans">

  <!-- Header -->
  <header class="sticky top-0 z-50 bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-5">
      <div class="flex items-center justify-between gap-4">
        <!-- Logo -->
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-violet-600 to-indigo-600 rounded-2xl flex items-center justify-center text-white font-bold text-3xl">S</div>
          <h1 class="text-2xl sm:text-3xl font-bold tracking-tighter">ShopSphere</h1>
        </div>

        <!-- Search Bar -->
        <div class="flex-1 max-w-xl mx-4 hidden md:block">
          <div class="relative">
            <input 
              id="searchInput"
              type="text" 
              placeholder="Search products with AI... (e.g. wireless headphones, premium watch)"
              class="w-full bg-white dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700 rounded-3xl py-3 pl-12 pr-6 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 placeholder-zinc-400 dark:placeholder-zinc-500"
            />
            <div class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-400">
              <i class="fa-solid fa-magnifying-glass"></i>
            </div>
          </div>
        </div>

        <!-- Right Side -->
        <div class="flex items-center gap-3 sm:gap-6">
          <!-- Mobile Search Button -->
          <button id="mobileSearchBtn" class="md:hidden text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white p-2">
            <i class="fa-solid fa-magnifying-glass text-2xl"></i>
          </button>

          <!-- Theme Toggle -->
          <button id="themeToggle" class="text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white p-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800">
            <i id="themeIcon" class="fa-solid fa-moon text-2xl"></i>
          </button>

          <!-- Cart -->
          <button id="cartBtn" class="relative flex items-center gap-2 text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white p-2">
            <i class="fa-solid fa-bag-shopping text-2xl"></i>
            <span id="cartCount" class="absolute -top-1 -right-1 bg-rose-500 text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
          </button>

          <!-- User -->
          <div class="w-9 h-9 rounded-2xl overflow-hidden border-2 border-white dark:border-zinc-700 shadow hidden sm:block">
            <img src="https://i.pravatar.cc/128" alt="User" class="w-full h-full object-cover"/>
          </div>

          <!-- Hamburger -->
          <button id="mobileMenuBtn" class="md:hidden text-zinc-500 dark:text-zinc-400 p-2">
            <i id="menuIcon" class="fa-solid fa-bars text-2xl"></i>
          </button>
        </div>
      </div>

      <!-- Mobile Menu -->
      <div id="mobileMenu" class="hidden md:hidden pt-6 pb-4 border-t border-zinc-200 dark:border-zinc-700 mt-4">
        <nav class="flex flex-col gap-4 text-base font-medium">
          <a href="#" class="hover:text-violet-600 dark:hover:text-violet-400 py-2">Home</a>
          <a href="#" class="hover:text-violet-600 dark:hover:text-violet-400 py-2">Shop</a>
          <a href="#" class="hover:text-violet-600 dark:hover:text-violet-400 py-2">Categories</a>
          <a href="#" class="hover:text-violet-600 dark:hover:text-violet-400 py-2">Brands</a>
        </nav>
      </div>

      <!-- Mobile Search Input -->
      <div id="mobileSearch" class="hidden md:hidden mt-4">
        <input 
          id="mobileSearchInput"
          type="text" 
          placeholder="Search with AI..."
          class="w-full bg-white dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700 rounded-3xl py-3 pl-12 pr-6 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500"
        />
      </div>
    </div>
  </header>

  <!-- Hero -->
  <section class="bg-gradient-to-br from-zinc-900 via-black to-zinc-900 text-white py-16 md:py-24">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 text-center">
      <h2 class="text-4xl md:text-5xl lg:text-6xl font-bold tracking-tighter mb-4">Discover Excellence</h2>
      <p class="text-zinc-400 text-base md:text-lg max-w-xl mx-auto">Premium products curated just for you.</p>
    </div>
  </section>

  <!-- Products Section -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-10 md:py-12">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
      <h2 id="sectionTitle" class="text-3xl md:text-4xl font-semibold text-zinc-900 dark:text-white">Featured Products</h2>
      
      <select id="categoryFilter" 
              class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded-2xl px-5 py-3 text-sm w-full sm:w-auto focus:outline-none focus:ring-2 focus:ring-violet-500">
        <option value="">All Categories</option>
      </select>
    </div>

    <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8">
      <!-- Populated by JavaScript -->
    </div>
  </main>

  <!-- Product Modal (same as before) -->
  <div id="productModal" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4">
    <div class="modal bg-white dark:bg-zinc-900 rounded-3xl max-w-4xl w-full max-h-[95vh] overflow-hidden shadow-2xl flex flex-col lg:flex-row">
      <div class="lg:w-1/2 image-container p-6 md:p-10 flex items-center justify-center border-b lg:border-b-0 lg:border-r border-zinc-100 dark:border-zinc-700">
        <img id="modalImage" src="" alt="" class="max-h-[380px] lg:max-h-[420px] w-full object-contain rounded-2xl"/>
      </div>
      <div class="lg:w-1/2 p-6 md:p-8 lg:p-10 flex flex-col overflow-y-auto">
        <div class="flex justify-between items-start">
          <div>
            <span id="modalCategory" class="inline-block px-4 py-1 bg-violet-100 dark:bg-violet-900/30 text-violet-700 dark:text-violet-400 text-xs font-semibold rounded-full"></span>
            <h3 id="modalName" class="text-2xl md:text-3xl font-bold text-zinc-900 dark:text-white mt-3"></h3>
            <p id="modalBrand" class="text-zinc-500 dark:text-zinc-400 mt-1"></p>
          </div>
          <button onclick="closeModal()" class="text-4xl text-zinc-300 dark:text-zinc-600 hover:text-zinc-500 dark:hover:text-zinc-300">×</button>
        </div>

        <div class="flex items-center gap-4 mt-6">
          <div class="flex text-amber-400 text-xl">★★★★☆</div>
          <span id="modalRating" class="text-sm text-zinc-500 dark:text-zinc-400"></span>
        </div>

        <p id="modalDescription" class="text-zinc-600 dark:text-zinc-300 mt-6 leading-relaxed"></p>

        <div class="mt-auto pt-8 border-t border-zinc-100 dark:border-zinc-700">
          <span class="text-4xl font-bold text-zinc-900 dark:text-white" id="modalPrice"></span>
          <button onclick="addToCartFromModal()" 
                  class="mt-8 w-full bg-zinc-900 hover:bg-black dark:bg-white dark:hover:bg-zinc-100 dark:text-zinc-900 text-white py-5 rounded-2xl font-semibold text-lg flex items-center justify-center gap-3">
            <i class="fa-solid fa-cart-plus"></i>
            Add to Cart
          </button>
        </div>
      </div>
    </div>
  </div>

    <!-- Cart Modal -->
  <div id="cartModal" class="hidden fixed inset-0 bg-black/70 z-[110] flex items-center justify-center p-4">
    <div class="modal bg-white dark:bg-zinc-900 rounded-3xl max-w-lg w-full max-h-[90vh] overflow-hidden shadow-2xl flex flex-col">
      <!-- Header -->
      <div class="flex items-center justify-between p-6 border-b border-zinc-200 dark:border-zinc-700">
        <h3 class="text-2xl font-semibold flex items-center gap-3">
          <i class="fa-solid fa-bag-shopping"></i>
          Your Cart
        </h3>
        <button onclick="closeCartModal()" 
                class="text-4xl text-zinc-300 dark:text-zinc-600 hover:text-zinc-500 dark:hover:text-zinc-300">×</button>
      </div>

      <!-- Cart Content -->
      <div class="flex-1 overflow-y-auto p-6" id="cartItems">
        <!-- Populated by JavaScript -->
      </div>

      <!-- Empty State -->
      <div id="emptyCartState" class="hidden flex-1 flex flex-col items-center justify-center py-16 text-center">
        <i class="fa-solid fa-bag-shopping text-7xl text-zinc-300 dark:text-zinc-700 mb-6"></i>
        <h4 class="text-xl font-semibold text-zinc-900 dark:text-white">Your cart is empty</h4>
        <p class="text-zinc-500 dark:text-zinc-400 mt-2">Looks like you haven't added anything yet.</p>
        <button onclick="closeCartModal()" 
                class="mt-8 px-8 py-3 bg-zinc-900 hover:bg-black dark:bg-white dark:hover:bg-zinc-100 dark:text-zinc-900 text-white rounded-2xl font-medium">
          Continue Shopping
        </button>
      </div>

      <!-- Footer (Subtotal + Checkout) -->
      <div class="p-6 border-t border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-950">
        <div class="flex justify-between items-center mb-6">
          <span class="text-zinc-600 dark:text-zinc-400">Subtotal</span>
          <span id="cartSubtotal" class="text-2xl font-bold text-zinc-900 dark:text-white">$0.00</span>
        </div>
        
        <button onclick="window.location.href = 'cart';" 
                class="w-full bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-700 hover:to-indigo-700 text-white py-5 rounded-2xl font-semibold text-lg flex items-center justify-center gap-3">
          <i class="fa-solid fa-lock"></i>
          Proceed to Checkout
        </button>
        
        <p class="text-center text-xs text-zinc-500 dark:text-zinc-400 mt-4">
          Shipping and taxes calculated at checkout
        </p>
      </div>
    </div>
  </div>

  <script>
    let allProducts = [];
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let currentProduct = null;
    let isSearching = false;
    const baseUrl = `${window.location.protocol}//${window.location.host}`;

    // Theme
    function initTheme() {
      if (localStorage.getItem('theme') === 'dark' ||
         (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
        document.getElementById('themeIcon').classList.replace('fa-moon', 'fa-sun');
      }
    }

    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      const icon = document.getElementById('themeIcon');
      icon.classList.toggle('fa-sun', isDark);
      icon.classList.toggle('fa-moon', !isDark);
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    // Mobile Menu
    document.getElementById('mobileMenuBtn').addEventListener('click', () => {
      const menu = document.getElementById('mobileMenu');
      const icon = document.getElementById('menuIcon');
      menu.classList.toggle('hidden');
      icon.classList.toggle('fa-bars');
      icon.classList.toggle('fa-xmark');
    });

    // ==================== CART MODAL ====================
    function openCartModal() {
      const modal = document.getElementById('cartModal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      renderCart();
    }

    function closeCartModal() {
      const modal = document.getElementById('cartModal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    function renderCart() {
      const cartItemsContainer = document.getElementById('cartItems');
      const subtotalEl = document.getElementById('cartSubtotal');
      const emptyState = document.getElementById('emptyCartState');

      if (cart.length === 0) {
        emptyState.classList.remove('hidden');
        cartItemsContainer.classList.add('hidden');
        subtotalEl.textContent = '$0.00';
        return;
      }

      emptyState.classList.add('hidden');
      cartItemsContainer.classList.remove('hidden');

      let subtotal = 0;
      cartItemsContainer.innerHTML = '';

      cart.forEach((item, index) => {
        const itemTotal = parseFloat(item.price) * (item.quantity || 1);
        subtotal += itemTotal;

        const itemHTML = `
          <div class="flex gap-4 py-6 border-b border-zinc-200 dark:border-zinc-700 last:border-b-0">
            <div class="w-20 h-20 bg-zinc-100 dark:bg-zinc-800 rounded-2xl overflow-hidden flex-shrink-0">
              <img src="${item.image}" 
                   onerror="this.src='https://picsum.photos/id/${item.id + 10}/600/400'"
                   alt="${item.name}" 
                   class="w-full h-full object-cover"/>
            </div>
            <div class="flex-1 min-w-0">
              <h4 class="font-semibold text-zinc-900 dark:text-white line-clamp-2">${item.name}</h4>
              <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-1">${item.brand || ''}</p>
              
              <div class="flex items-center justify-between mt-4">
                <div class="flex items-center border border-zinc-300 dark:border-zinc-600 rounded-2xl overflow-hidden">
                  <button onclick="changeQuantity(${index}, -1)" 
                          class="w-9 h-9 flex items-center justify-center hover:bg-zinc-100 dark:hover:bg-zinc-800 text-lg font-medium">-</button>
                  <span class="px-4 font-medium">${item.quantity || 1}</span>
                  <button onclick="changeQuantity(${index}, 1)" 
                          class="w-9 h-9 flex items-center justify-center hover:bg-zinc-100 dark:hover:bg-zinc-800 text-lg font-medium">+</button>
                </div>
                
                <div class="text-right">
                  <div class="font-semibold text-lg">$${(itemTotal).toFixed(2)}</div>
                  <button onclick="removeFromCart(${index})" 
                          class="text-rose-500 hover:text-rose-600 text-sm mt-1 flex items-center gap-1">
                    <i class="fa-solid fa-trash"></i> Remove
                  </button>
                </div>
              </div>
            </div>
          </div>
        `;
        cartItemsContainer.innerHTML += itemHTML;
      });

      subtotalEl.textContent = `$${subtotal.toFixed(2)}`;
    }

    function changeQuantity(index, change) {
      if (!cart[index]) return;
      
      cart[index].quantity = (cart[index].quantity || 1) + change;
      
      if (cart[index].quantity < 1) {
        cart.splice(index, 1);
      }
      
      renderCart();
      updateCartCount();
    }

    function removeFromCart(index) {
      if (confirm("Remove this item from cart?")) {
        cart.splice(index, 1);
        renderCart();
        updateCartCount();
      }
    }

    function addToCart(product) {
      const existing = cart.find(item => item.id === product.id);
      if (existing) {
        existing.quantity = (existing.quantity || 1) + 1;
      } else {
        cart.push({ ...product, quantity: 1 });
      }
      updateCartCount();
      showToast(`${product.name} added to cart`);
    }

    function addToCartFromModal() {
      if (currentProduct) addToCart(currentProduct);
      closeModal();
    }

    function updateCartCount() {
      localStorage.setItem('cart', JSON.stringify(cart));
      const count = cart.reduce((acc, item) => acc + (item.quantity || 1), 0);
      document.getElementById('cartCount').textContent = count;
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.style.cssText = `position: fixed; bottom: 24px; right: 24px; background: #18181b; color: white; padding: 16px 24px; border-radius: 9999px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.2); z-index: 200;`;
      toast.innerHTML = `<i class="fa-solid fa-check-circle text-green-400"></i> ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2800);
    }

    // ==================== EXISTING FUNCTIONS (unchanged) ====================
    async function performSearch(query) {
      if (!query.trim()) {
        renderProducts(allProducts);
        document.getElementById('sectionTitle').textContent = 'Featured Products';
        return;
      }
      isSearching = true;
      document.getElementById('sectionTitle').textContent = `Searching for "${query}"...`;
      try {
        const res = await fetch(`${baseUrl}/products/filter`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: query.trim() })
        });
        if (!res.ok) throw new Error('Search failed');
        const products = await res.json();
        renderProducts(products);
        document.getElementById('sectionTitle').textContent = `Results for "${query}" (${products.length})`;
      } catch (error) {
        console.error("Search error:", error);
        document.getElementById('sectionTitle').textContent = 'Search failed. Showing all products.';
        renderProducts(allProducts);
      } finally {
        isSearching = false;
      }
    }

    async function fetchProducts() {
      try {
        const res = await fetch(`${baseUrl}/products`);
        allProducts = await res.json();
        renderProducts(allProducts);
        populateCategoryFilter();
      } catch (error) {
        console.error("Error fetching products:", error);
        document.getElementById('productsGrid').innerHTML = `
          <div class="col-span-full text-center py-20 text-red-500 dark:text-red-400">
            Failed to load products.
          </div>`;
      }
    }

    function renderProducts(products) {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = '';
      if (products.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full text-center py-20 text-zinc-500 dark:text-zinc-400">
            No products found.
          </div>`;
        return;
      }
      products.forEach(product => {
        const price = parseFloat(product.price).toFixed(2);
        const cardHTML = `
          <div class="product-card bg-white dark:bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-100 dark:border-zinc-700 group">
            <div class="relative">
              <img src="${product.image}"
                   onerror="this.src='https://picsum.photos/id/${product.id + 10}/600/400'"
                   alt="${product.name}"
                   class="w-full h-64 object-cover group-hover:scale-105 transition-transform duration-500"/>
              ${product.is_featured ? `<div class="absolute top-4 right-4 bg-amber-500 text-white text-xs font-bold px-3 py-1 rounded-2xl shadow">Featured</div>` : ''}
            </div>
            <div class="p-6">
              <p class="text-xs font-medium text-violet-600 dark:text-violet-400">${product.category?.name || 'Uncategorized'}</p>
              <h3 class="font-semibold text-lg text-zinc-900 dark:text-white mt-2 line-clamp-2">${product.name}</h3>
              <div class="flex items-center justify-between mt-6">
                <div class="text-2xl font-bold text-zinc-900 dark:text-white">$${price}</div>
                <button onclick="viewProduct(${product.id})"
                        class="bg-zinc-900 hover:bg-black dark:bg-white dark:hover:bg-zinc-100 dark:text-zinc-900 text-white px-6 py-3 rounded-2xl text-sm font-medium transition-all">
                  Quick View
                </button>
              </div>
            </div>
          </div>
        `;
        grid.innerHTML += cardHTML;
      });
    }

    function populateCategoryFilter() {
      const categories = [...new Set(allProducts.map(p => p.category?.name).filter(Boolean))];
      const select = document.getElementById('categoryFilter');
      categories.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat;
        option.textContent = cat;
        select.appendChild(option);
      });
      select.addEventListener('change', () => {
        const filtered = select.value
          ? allProducts.filter(p => p.category?.name === select.value)
          : allProducts;
        renderProducts(filtered);
        document.getElementById('sectionTitle').textContent = select.value ? `${select.value}` : 'Featured Products';
      });
    }

    function viewProduct(id) {
      currentProduct = allProducts.find(p => p.id == id);
      if (!currentProduct) return;

      document.getElementById('modalImage').src = currentProduct.image || `https://picsum.photos/id/${currentProduct.id}/800/600`;
      document.getElementById('modalName').textContent = currentProduct.name;
      document.getElementById('modalBrand').textContent = currentProduct.brand || '';
      document.getElementById('modalCategory').textContent = currentProduct.category?.name || 'Product';
      document.getElementById('modalDescription').textContent = currentProduct.description || 'No description available.';
      document.getElementById('modalPrice').textContent = `$${parseFloat(currentProduct.price).toFixed(2)}`;
      document.getElementById('modalRating').textContent = `${currentProduct.rating || 4.5} • ${currentProduct.total_reviews || 120} reviews`;
      
      document.getElementById('productModal').classList.remove('hidden');
      document.getElementById('productModal').classList.add('flex');
    }

    function closeModal() {
      const modal = document.getElementById('productModal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    // Event Listeners
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    
    // Cart Button - Now opens modal instead of alert
    document.getElementById('cartBtn').addEventListener('click', openCartModal);

    // Desktop Search
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') performSearch(searchInput.value);
    });

    // Mobile Search
    document.getElementById('mobileSearchBtn').addEventListener('click', () => {
      const mobileSearch = document.getElementById('mobileSearch');
      mobileSearch.classList.toggle('hidden');
      if (!mobileSearch.classList.contains('hidden')) {
        document.getElementById('mobileSearchInput').focus();
      }
    });

    const mobileSearchInput = document.getElementById('mobileSearchInput');
    mobileSearchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        performSearch(mobileSearchInput.value);
        mobileSearchInput.value = '';
        document.getElementById('mobileSearch').classList.add('hidden');
      }
    });

    // Close modals when clicking outside
    document.getElementById('productModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('productModal')) closeModal();
    });
    document.getElementById('cartModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('cartModal')) closeCartModal();
    });

    // Initialize
    window.onload = () => {
      initTheme();
      fetchProducts();
      updateCartCount();
      renderCart();
    };
  </script>
</body>
</html>
